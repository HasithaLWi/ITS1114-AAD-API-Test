spring.application.name=AAD

server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# Replace 'your_database_name' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/aad_first_project?createDatabaseIfNotExist=true

# Replace with your MySQL username (default is usually 'root')
spring.datasource.username=root

# Replace with your MySQL password
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# SPRING DATA JPA & HIBERNATE
# ===============================
# Automatically creates or updates your database tables based on your Entity classes
spring.jpa.hibernate.ddl-auto=update

# Shows the generated SQL queries in the console
spring.jpa.show-sql=true

# Formats the SQL queries in the console to make them readable
spring.jpa.properties.hibernate.format_sql=true

# Explicitly sets the SQL dialect (Optional but recommended)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect